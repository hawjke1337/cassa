version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: astore-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: astore
      POSTGRES_PASSWORD: astore_dev_2026
      POSTGRES_DB: astore_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astore"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: astore-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://astore:astore_dev_2026@db:5432/astore_erp
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

volumes:
  postgres_data:
